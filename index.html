<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>LUST SUMMER CAFE</title>
    <style>
        /* "Lust Summer" Estetikası */
        :root {
            --primary: #e67e22; /* Gün batımı narıncısı */
            --bg: #fdf6e4;      /* Qum rəngi */
            --text: #2c3e50;    /* Dəniz mavisi tonunda tünd */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif; /* Daha nostalji şrift */
        }

        .navbar { background-color: #2c3e50; }
        .nav-logo { color: var(--primary); font-family: 'Playfair Display', serif; }
        
        .category-btn.active { background-color: var(--primary); }
        
        .product-card {
            border-radius: 30px 0 30px 0; /* Daha maraqlı kəsim */
            border: 2px solid #e67e22;
            background: #fff;
        }

        .btn { background-color: var(--primary); }
        
        /* Kafe üçün menyu başlıqları */
        .menu-header { text-align: center; padding: 40px; font-size: 30px; font-style: italic; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">LUST SUMMER CAFE</div>
        <div class="nav-controls">
            <button class="nav-cart-btn" onclick="toggleCartDrawer(true)">☕ Səbət</button>
        </div>
    </nav>

    <div class="menu-header">"Həyat bir yay kimidir, qısa və unudulmaz..."</div>

    <div class="category-bar">
        <button class="category-btn active" onclick="filterMenu('coffee', this)">Qəhvələr</button>
        <button class="category-btn" onclick="filterMenu('dessert', this)">Desertlər</button>
        <button class="category-btn" onclick="filterMenu('cocktail', this)">Kokteyllər</button>
    </div>

    <main class="main-content">
        <div class="products-grid" id="productsContainer"></div>
    </main>

    <script>
        // Kafe menyusu verilənlər bazası
        const menuItems = [
            { id: 1, cat: 'coffee', name: 'Yay Qəhvəsi (Signature)', price: 7, img: 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400' },
            { id: 2, cat: 'coffee', name: 'Soyuq Brew', price: 6, img: 'https://images.unsplash.com/photo-1517701160238-8e6d27575298?w=400' },
            { id: 3, cat: 'dessert', name: 'Limonlu Tart', price: 9, img: 'https://images.unsplash.com/photo-1519915028121-7d3463d20b13?w=400' },
            { id: 4, cat: 'cocktail', name: 'Sunset Breeze', price: 12, img: 'https://images.unsplash.com/photo-1551024709-8f23befc6f87?w=400' }
        ];

        function renderMenu(cat = 'coffee') {
            const container = document.getElementById("productsContainer");
            container.innerHTML = "";
            menuItems.filter(i => i.cat === cat).forEach(item => {
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${item.img}" class="product-img">
                        <h3>${item.name}</h3>
                        <p>${item.price} AZN</p>
                        <button class="btn">Sifariş Et</button>
                    </div>
                `;
            });
        }

        function filterMenu(cat, btn) {
            document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            renderMenu(cat);
        }

        renderMenu();
    </script>
</body>
</html>
