<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>LUST SUMMER | Kafe & Bistro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Montserrat:wght@300;400&display=swap');

        :root {
            --warm-sand: #e8dcc4;
            --faded-blue: #7a8c99;
            --sunset-orange: #d18a66;
            --cream: #f9f7f2;
        }

        body {
            background-color: var(--cream);
            color: #4a4a4a;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Hero Bölməsi - O yay ab-havası üçün */
        .header {
            text-align: center;
            padding: 80px 20px;
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .menu-grid {
            max-width: 1000px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 20px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            border-bottom: 1px solid #ddd;
        }

        .menu-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
        }

        .menu-item h3 { margin: 0; font-family: 'Playfair Display', serif; color: var(--sunset-orange); }

        /* "Aesthetic" düymə */
        .order-btn {
            background: transparent;
            border: 1px solid var(--faded-blue);
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .order-btn:hover { background: var(--faded-blue); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>LUST SUMMER</h1>
        <p>Günün yorğunluğunu dəniz küləyi ilə çıxarın...</p>
    </div>

    <div class="menu-grid">
        <!-- Menyu Nümunələri -->
        <div class="menu-item">
            <img src="https://images.unsplash.com/photo-1559496417-e7f25cb247f3?w=200" alt="Qəhvə">
            <div>
                <h3>İsti Yay Qəhvəsi</h3>
                <p>Nostalji dadlar ilə.</p>
                <button class="order-btn">Sifariş</button>
            </div>
        </div>
        
        <div class="menu-item">
            <img src="https://images.unsplash.com/photo-1579613832111-ac74f7ce7e60?w=200" alt="Desert">
            <div>
                <h3>Gün Batımı Tartı</h3>
                <p>Təzə meyvələrlə.</p>
                <button class="order-btn">Sifariş</button>
            </div>
        </div>
    </div>

</body>
</html>
